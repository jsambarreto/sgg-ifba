<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso - Sistema de Gestão IFBA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid #2ecc71; /* Verde IFBA */ }
        .login-container h2 { color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #7f8c8d; font-weight: bold; font-size: 0.9em; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        .btn-login:hover { background: #27ae60; }
        .error-msg { color: #e74c3c; font-size: 0.9em; margin-bottom: 15px; background: #fadbd8; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>SGG - Gestão de Grades</h2>
        
        {% if form.errors %}
            <div class="error-msg">Usuário ou senha incorretos. Tente novamente.</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuário (Ex: jorge.barreto)</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>
    </div>

</body>
</html>
